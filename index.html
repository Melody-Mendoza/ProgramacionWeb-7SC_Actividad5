<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instituto Tecnologico de Oaxaca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Melody-Mendoza/ProgramacionWeb-7SC_Actividad3@main/css/componente.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header class="navbar">
        <div class="navbar-titulo">Panel de Administración</div>

        <div class="navbar-usuario" id="perfil-usuario">
            <span id="nombre-usuario">Cargando...</span> ▾
            <div class="dropdown-salir" id="menu-salir">
                <a href="login.html">Salir del sistema</a>
            </div>
        </div>
    </header>

    <button id="btn-menu" class="btn-menu">☰</button>

    <aside id="menu-lateral" class="sidebar oculto">
        <ul class="lista-menu">
            <li>
                <button class="btn-opcion" id="btn_usuarios">Usuarios</button>

                <ul class="submenu" id="subsubmenu_captura">
                    <li>
                        <button class="btn-subopcion" id="btn_mostrar_captura">Captura</button>
                    </li>
                </ul>
            </li>

            <li>
                <button class="btn-opcion" id="btn_alumnos">Alumnos</button>
            </li>
        </ul>
    </aside>

    <main class="contenido-principal">

        <section id="seccion-captura" class="seccion ocultar-seccion">
            <h2>Captura de Usuarios</h2>
            <form id="form-captura" novalidate>
                <div class="campo">
                    <label>Nombre de Usuario:</label>
                    <input type="text" id="cap-nombre" required>
                </div>
                <div class="campo">
                    <label>Correo Electrónico:</label>
                    <input type="email" id="cap-correo" required>
                </div>
                <div class="campo">
                    <label>Contraseña (8 caracteres):</label>
                    <input type="password" id="cap-password" required>
                </div>

                <div id="alerta-error-captura" class="alert alert-danger d-none text-center" role="alert" style="padding: 10px; font-size: 14px;">
                    Verifica introducir bien los campos.
                </div>

                <div id="alerta-exito" class="alert alert-success d-none text-center" role="alert" style="padding: 10px; font-size: 14px;">
                    ¡Usuario guardado correctamente!
                </div>

                <button type="submit" class="btn-guardar" id="btn-submit-captura">Guardar Usuario</button>
                <button type="button" class="btn-regresar" id="btn-regresar-captura">Regresar al inicio</button>
            </form>
        </section>

        <section id="seccion-alumnos" class="seccion ocultar-seccion">
            <h2>Registro de Alumnos</h2>
            <form id="form-alumnos" novalidate>
                <div class="campo">
                    <label>Número de Control (6 dígitos):</label>
                    <input type="text" id="alum-control" required>
                </div>
                <div class="campo">
                    <label>Edad del Alumno:</label>
                    <input type="number" id="alum-edad" required min="1">
                </div>

                <div id="alerta-error-alumnos" class="alert alert-danger d-none text-center" role="alert" style="padding: 10px; font-size: 14px;">
                    Verifica introducir bien todos los campos requeridos.
                </div>

                <button type="submit" class="btn-guardar" id="btn-submit-alumnos">Registrar Alumno</button>
                <button type="button" class="btn-regresar" id="btn-regresar-alumnos">Regresar al inicio</button>
            </form>
        </section>

        <div id="contenedor-carrusel">

        </div>

    </main>

    <div class="modal fade" id="modal-edad" tabindex="-1" aria-labelledby="modalEdadLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEdadLabel">Validación de Edad</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="modal-texto" style="font-weight: bold; margin: 0;"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" id="btn-cerrar-modal" data-bs-dismiss="modal" style="background-color: var(--color-primario); border: none;">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <script
        src="https://cdn.jsdelivr.net/gh/Angel-2329/Programacion-WEB-7SC-Actividad-2@main/js/validaciones.js"></script>
    <script
        src="https://cdn.jsdelivr.net/gh/Angel-2329/Verano-de-Programacion-WEB-7SC-Actividad-3@main/js/componente.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="js/index.js"></script>
</body>

</html>
