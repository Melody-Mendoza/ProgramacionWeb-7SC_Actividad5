<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSS propio -->
    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Angel-2329/Verano-de-Programacion-WEB-7SC-Actividad-3@main/css/componente.css">
</head>

<body>
    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow p-4 login-card">
            <div class="row align-items-center mb-4">
                <div class="col-8">
                    <h2>Sistema Escolar</h2>
                    <p class="text-muted mb-0">
                        Inicia sesión para acceder al sistema.
                    </p>
                </div>
                <div class="col-4 text-end">
                    <img src="img/logoITO.png" alt="Logo" class="img-fluid" width="90">
                </div>
            </div>
            <form id="formLogin">
                <div class="mb-3">
                    <label for="correo" class="form-label">
                        Correo electrónico
                    </label>
                    <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com" >
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">
                        Contraseña
                    </label>
                    <input type="password" class="form-control" id="password" placeholder="********" >
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="mostrarPassword">

                    <label class="form-check-label" for="mostrarPassword">
                        Mostrar contraseña
                    </label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Iniciar sesión
                    </button>
                </div>
                <div class="text-center mt-4">
                    <small class="text-muted">
                        © 2026 Programación Web
                    </small>

                </div>
            </form>
        </div>
    </div>
        <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Lógica -->
    <script type="module" src="js/login.js"></script>
</body>

</html>
